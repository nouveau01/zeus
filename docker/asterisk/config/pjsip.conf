; === Transport ===

[transport-ws]
type=transport
protocol=wss
bind=0.0.0.0:8089
allow_reload=yes

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; === Extension 1001 (Zach's browser) ===

[1001]
type=endpoint
context=internal
disallow=all
allow=ulaw
auth=1001-auth
aors=1001
webrtc=yes
dtls_auto_generate_cert=yes
media_encryption=dtls

[1001-auth]
type=auth
auth_type=userpass
username=1001
password=test1234

[1001]
type=aor
max_contacts=5
remove_existing=yes

; === Extension 1002 (second browser tab for testing) ===

[1002]
type=endpoint
context=internal
disallow=all
allow=ulaw
auth=1002-auth
aors=1002
webrtc=yes
dtls_auto_generate_cert=yes
media_encryption=dtls

[1002-auth]
type=auth
auth_type=userpass
username=1002
password=test1234

[1002]
type=aor
max_contacts=5
remove_existing=yes

; === Telnyx SIP Trunk ===

[telnyx-reg]
type=registration
transport=transport-udp
outbound_auth=telnyx-auth
server_uri=sip:sip.telnyx.com
client_uri=sip:zeus123456@sip.telnyx.com
retry_interval=30

[telnyx-auth]
type=auth
auth_type=userpass
username=zeus123456
password=zeus123456

[telnyx-aor]
type=aor
contact=sip:sip.telnyx.com
qualify_frequency=60

[telnyx-endpoint]
type=endpoint
context=from-telnyx
disallow=all
allow=ulaw
allow=alaw
outbound_auth=telnyx-auth
aors=telnyx-aor
from_user=+15162198121
from_domain=sip.telnyx.com

[telnyx-identify]
type=identify
endpoint=telnyx-endpoint
match=sip.telnyx.com
