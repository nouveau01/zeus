[internal]
; Internal extensions
exten => 1001,1,Dial(PJSIP/1001,30)
 same => n,Hangup()

exten => 1002,1,Dial(PJSIP/1002,30)
 same => n,Hangup()

; Echo test
exten => 9999,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; Outbound via Telnyx - 10-digit US numbers (auto-prepend +1)
exten => _NXXXXXXXXX,1,Set(CALLERID(num)=+15162198121)
 same => n,Set(CALLERID(name)=Nouveau Elevator)
 same => n,Dial(PJSIP/telnyx-endpoint/sip:+1${EXTEN}@sip.telnyx.com,60)
 same => n,Hangup()

; Outbound via Telnyx - 11-digit (1 + 10 digit)
exten => _1NXXXXXXXXX,1,Set(CALLERID(num)=+15162198121)
 same => n,Set(CALLERID(name)=Nouveau Elevator)
 same => n,Dial(PJSIP/telnyx-endpoint/sip:+${EXTEN}@sip.telnyx.com,60)
 same => n,Hangup()

[from-telnyx]
; Inbound calls from Telnyx ring extension 1001
exten => _X.,1,Dial(PJSIP/1001,30)
 same => n,Hangup()
